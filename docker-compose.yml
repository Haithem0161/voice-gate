services:
  postgres:
    image: postgres:17-alpine
    container_name: voice-gate-postgres
    restart: unless-stopped
    ports:
      - "5460:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: voice_gate_dev
    volumes:
      - voice_gate_pgdata:/var/lib/postgresql/data

volumes:
  voice_gate_pgdata:
